

  
      <!DOCTYPE html>
      <html lang="en">
      <head>
          <meta charset="UTF-8">
          <title>阿里云 OSS 图片上传示例</title>
      </head>
      <body>
      
      <h2>图片上传</h2>
      <form id="uploadForm" enctype="multipart/form-data">
          <input type="file" name="file" accept="image/*" required>
          <button type="submit">上传图片</button>
      </form>
      
      <div>
          <img id="uploadedImage" src="" alt="已上传的图片" style="max-width: 100%;">
      </div>
      
      <script>
          document.getElementById('uploadForm').addEventListener('submit', function(event) {
              event.preventDefault(); // 阻止表单默认提交行为
      
              const formData = new FormData(this); // 创建 FormData 对象
      
              fetch('https://apiupload-gfatptrscp.cn-hangzhou.fcapp.run', { // 假设这是你的后端上传接口
                  method: 'POST',
                  body: formData
              })
              .then(response => response.json()) // 假设后端返回 JSON 格式的响应
              .then(data => {
                  if(data.success) {
                      const imageUrl = data.url;
                      document.getElementById('uploadedImage').src = imageUrl; // 设置图片 URL
                  } else {
                      alert('上传失败');
                  }
              })
              .catch(error => {
                  console.error('上传过程中发生错误:', error);
                  alert('上传出错');
              });
          });
      </script>
      
      </body>
      </html>
