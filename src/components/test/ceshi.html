<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>图片上传示例</title>
  </head>
  <body>
    <h2>图片上传</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <input type="file" name="file" accept="image/*" required />
      <button type="submit">上传图片</button>
    </form>
    <div>
      <img
        id="uploadedImage"
        src=""
        alt="已上传的图片"
        style="max-width: 100%"
      />
    </div>

    <script>
      document
        .getElementById("uploadForm")
        .addEventListener("submit", function (event) {
          event.preventDefault(); // 阻止表单默认提交行为

          const uploadForm = this;
          const formData = new FormData(uploadForm); // 创建 FormData 对象

          fetch(
            "https://picui.cn/api/v1/images/146|CtnUQCNIMQpTLtZyqrO2XX8107YAAuo62dBAmjyf",
            {
              // 修改为实际的上传接口 URL
              method: "POST",
              body: formData,
            }
          )
            .then((response) => {
              if (!response.ok) {
                throw new Error("Network response was not ok");
              }
              return response.json(); // 尝试解析为 JSON
            })
            .then((data) => {
              if (data.success) {
                const imageUrl = data.url; // 假设返回的数据中包含一个名为 'url' 的字段
                document.getElementById("uploadedImage").src = imageUrl; // 设置图片 URL
              } else {
                alert("上传失败");
              }
            })
            .catch((error) => {
              console.error("上传过程中发生错误:", error);
              alert("上传出错");
            });
        });
    </script>
  </body>
</html>
